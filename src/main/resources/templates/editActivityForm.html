<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edycja aktywności</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: 'Outfit', Arial, sans-serif;
            color: #202124;
            background: #f7f7f8;
            line-height: 1.5;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        header,
        .card {
            border: 1px solid #d9dde3;
            background: #fff;
            padding: 16px;
            margin-bottom: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.35rem;
        }

        .nav-link,
        .btn-primary {
            display: inline-block;
            padding: 8px 12px;
            border: 1px solid #d9dde3;
            background: #fff;
            color: #202124;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-link:hover,
        .btn-primary:hover {
            color: #2563eb;
            border-color: #2563eb;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #6b7280;
        }

        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d9dde3;
            font: inherit;
        }

        .form-control:focus {
            outline: 2px solid #bfdbfe;
            border-color: #2563eb;
        }

        .btn-primary {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Edycja aktywności</h1>
            <nav>
                <a class="nav-link" th:href="@{/}">Strona główna</a>
            </nav>
        </header>

        <div class="card">
            <form th:action="@{/edit/{id}(id=${activity.id})}" th:method="put">
                <div class="form-group">
                    <label for="activity_name">Nazwa aktywności</label>
                    <input type="text" id="activity_name" name="activity_name" class="form-control" th:value="${activity.activity_name}" required>
                </div>

                <div class="form-group">
                    <label for="activity_description">Opis aktywności</label>
                    <input type="text" id="activity_description" name="activity_description" class="form-control" th:value="${activity.activity_description}" required>
                </div>

                <div class="form-group">
                    <label for="start_time">Czas rozpoczęcia</label>
                    <input type="time" id="start_time" name="start_time" class="form-control" th:value="${activity.start_time}" required>
                </div>

                <div class="form-group">
                    <label for="time">Czas trwania (minuty)</label>
                    <input type="number" id="time" name="time" class="form-control" th:value="${activity.time}" required>
                </div>

                <div class="form-group">
                    <label for="date">Data aktywności</label>
                    <input type="date" id="date" name="date" class="form-control" th:value="${#dates.format(activity.date, 'yyyy-MM-dd')}" required>
                </div>

                <button type="submit" class="btn-primary">Zapisz zmiany</button>
            </form>
        </div>
    </div>

</body>
</html>
